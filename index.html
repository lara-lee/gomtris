<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Gomtris · 곰트리스</title>
<!-- 픽셀풍 제목 폰트 (온라인) — 오프라인 시 monospace 폴백 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/css/style.css">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#fd6a8e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Gomtris">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div class="poster">
    <!-- 우측 최상단 나가기 -->
    <button id="exit-btn" class="exit-btn" title="나가기">✕ 나가기</button>

    <!-- 헤더 : 작은 젤리곰 로고 + 픽셀풍 멀티컬러 제목 -->
    <header class="poster-header">
      <img class="title-gom" src="assets/gomimg/pink.png" alt="">
      <h1 class="pixel-title" aria-label="GOMTRIS">
        <span style="color:#fd6a8e">G</span><span style="color:#6ed3f7">O</span><span style="color:#aed41c">M</span><span style="color:#fdd22c">T</span><span style="color:#fd6a8e">R</span><span style="color:#6ed3f7">I</span><span style="color:#fd6208">S</span>
      </h1>
    </header>

    <!-- 본문 -->
    <div class="layout">
      <!-- 점수: 텍스트 한 줄 (보드가 메인) -->
      <div class="scoreline">
        <span class="score-item">SCORE <b id="score">0</b></span>
        <span class="score-dot">·</span>
        <span class="score-item">BEST <b id="high">0</b></span>
      </div>

      <!-- 게임판 (메인) -->
      <div class="board-wrap">
        <div id="board" class="grid"></div>
        <div id="overlay" class="overlay show">
          <div class="overlay-window">
            <div class="overlay-bar">GOMTRIS</div>
            <div class="overlay-content">
              <h3 id="overlay-title">GOMTRIS</h3>
              <p id="overlay-text" style="display:none"></p>
              <button id="start" class="primary">게임 시작</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 툴바 -->
    <div class="toolbar">
      <button id="pause-btn">⏸ 일시정지</button>
      <button id="restart-btn">↻ 다시시작</button>
      <button id="help-btn">❔ 설명</button>
      <button id="mute-btn">🔊 소리 켬</button>
    </div>
  </div>

  <!-- 도움말 패널 -->
  <div id="help" class="help-overlay">
    <div class="help-card">
      <div class="help-bar">게임 방법 · HOW TO PLAY</div>
      <div class="help-body">

        <section class="help-sec">
          <h4>🎮 조작</h4>
          <dl class="keylist">
            <dt><kbd>←</kbd><kbd>→</kbd></dt><dd>좌우 이동</dd>
            <dt><kbd>↓</kbd><kbd>Space</kbd></dt><dd>빨리 내리기</dd>
            <dt><kbd>↑</kbd><kbd>X</kbd></dt><dd>회전</dd>
          </dl>
          <p class="help-touch">📱 <b>폰</b> — 좌우 드래그=이동 · 탭=회전 · 꾹 누르기=빨리 내리기</p>
        </section>

        <section class="help-sec">
          <h4>📜 규칙</h4>
          <ul class="rules">
            <li>가로 한 줄을 가득 채우면 사라지고 점수 획득</li>
            <li>한 번에 여러 줄 지울수록 점수 UP<br>
              <span class="dim">1줄 100 · 2줄 300 · 3줄 500 · 4줄(테트리스) 800점, 레벨이 높을수록 배수</span></li>
            <li>10줄마다 <b>레벨</b>이 올라 낙하 속도와 배경음 템포가 빨라짐</li>
          </ul>
        </section>

      </div>
      <button class="help-close-btn">✕ 닫기</button>
    </div>
  </div>

  <!-- 스크립트 -->
  <script src="src/js/config.js"></script>
  <script src="src/js/audio.js"></script>
  <script src="src/js/tetrominoes.js"></script>
  <script src="src/js/board.js"></script>
  <script src="src/js/renderer.js"></script>
  <script src="src/js/game.js"></script>
  <script src="src/js/input.js"></script>
  <script src="src/js/touch.js"></script>
  <script src="src/js/main.js"></script>

  <!-- 서비스워커 등록 (PWA 오프라인/설치). file:// 에선 조용히 무시 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
